# Fly.io — бесплатный тестовый сервер для SEVEN
# Деплой: deploy.bat (Windows) или fly deploy

app = 'seven-barber-shop'
primary_region = 'fra'

[build]

[env]
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
